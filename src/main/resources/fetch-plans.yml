fetch-plans:
  - entity: com.vn.core.domain.Organization
    name: organization-list
    properties:
      - id
      - code
      - name
      - ownerLogin

  - entity: com.vn.core.domain.Organization
    name: organization-detail
    extends: organization-list
    properties:
      - budget
      - name: departments
        properties:
          - id
          - code
          - name
          - costCenter
          - name: employees
            properties:
              - id
              - employeeNumber
              - firstName
              - lastName
              - email
              - salary

  - entity: com.vn.core.domain.Department
    name: department-list
    properties:
      - id
      - code
      - name
      - name: organization
        properties:
          - id
          - name
      - costCenter

  - entity: com.vn.core.domain.Department
    name: department-detail
    extends: department-list
    properties:
      - name: organization
        properties:
          - id
          - code
          - name
          - ownerLogin
      - name: employees
        properties:
          - id
          - employeeNumber
          - firstName
          - lastName
          - email
          - salary

  - entity: com.vn.core.domain.Employee
    name: employee-list
    properties:
      - id
      - employeeNumber
      - firstName
      - lastName
      - name: department
        properties:
          - id
          - name
      - email

  - entity: com.vn.core.domain.Employee
    name: employee-detail
    extends: employee-list
    properties:
      - salary
      - name: department
        properties:
          - id
          - code
          - name

  - entity: com.vn.core.domain.movie.MovieProfile
    name: movie-profile-list
    properties:
      - id
      - profileCode
      - movieName
      - movieType
      - classification
      - productionYear
      - startDate
      - endDate
      - status

  - entity: com.vn.core.domain.movie.MovieProfile
    name: movie-profile-detail
    extends: movie-profile-list
    properties:
      - genre
      - themeOrientation
      - summary
      - name: ekipMembers
        properties:
          - id
          - ekipName
          - role

  - entity: com.vn.core.domain.movie.ProductionEkip
    name: production-ekip-list
    properties:
      - id
      - ekipName
      - role
      - name: movieProfile
        properties:
          - id

  - entity: com.vn.core.domain.movie.ProductionEkip
    name: production-ekip-detail
    extends: production-ekip-list
