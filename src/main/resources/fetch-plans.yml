fetch-plans:
  - entity: com.vn.core.domain.Organization
    name: organization-list
    properties:
      - id
      - code
      - name
      - ownerLogin

  - entity: com.vn.core.domain.Organization
    name: organization-detail
    extends: organization-list
    properties:
      - budget
      - name: departments
        properties:
          - id
          - code
          - name
          - costCenter
          - name: employees
            properties:
              - id
              - employeeNumber
              - firstName
              - lastName
              - email
              - salary

  - entity: com.vn.core.domain.Department
    name: department-list
    properties:
      - id
      - code
      - name
      - name: organization
        properties:
          - id
          - name
      - costCenter

  - entity: com.vn.core.domain.Department
    name: department-detail
    extends: department-list
    properties:
      - name: organization
        properties:
          - id
          - code
          - name
          - ownerLogin
      - name: employees
        properties:
          - id
          - employeeNumber
          - firstName
          - lastName
          - email
          - salary

  - entity: com.vn.core.domain.Employee
    name: employee-list
    properties:
      - id
      - employeeNumber
      - firstName
      - lastName
      - name: department
        properties:
          - id
          - name
      - email

  - entity: com.vn.core.domain.Employee
    name: employee-detail
    extends: employee-list
    properties:
      - salary
      - name: department
        properties:
          - id
          - code
          - name

  - entity: com.vn.core.domain.Brand
    name: brand-list
    properties:
      - id
      - name
      - description

  - entity: com.vn.core.domain.Brand
    name: brand-detail
    extends: brand-list
    properties:
      - name: shoes
        properties:
          - id
          - name
          - decription

  - entity: com.vn.core.domain.Shoe
    name: shoe-list
    properties:
      - id
      - name
      - decription
      - name: brand
        properties:
          - id
          - name
          - description

  - entity: com.vn.core.domain.Shoe
    name: shoe-detail
    extends: shoe-list
    properties:
      - name: brand
        properties:
          - id
          - name
          - description
      - name: shoeVariants
        properties:
          - id
          - name
          - decription

  - entity: com.vn.core.domain.ShoeVariant
    name: shoevariant-list
    properties:
      - id
      - name
      - decription
      - name: shoe
        properties:
          - id
          - name
          - decription
          - name: brand
            properties:
              - id
              - name

  - entity: com.vn.core.domain.ShoeVariant
    name: shoevariant-detail
    extends: shoevariant-list
    properties:
      - name: shoe
        properties:
          - id
          - name
          - decription
          - name: brand
            properties:
              - id
              - name
