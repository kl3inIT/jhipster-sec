# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
services:
  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - '127.0.0.1:1025:1025'
      - '127.0.0.1:8025:8025'
    healthcheck:
      test:
        - CMD
        - /mailpit
        - readyz
      interval: 5s
      timeout: 5s
      retries: 20
