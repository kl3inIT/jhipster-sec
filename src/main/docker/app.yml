# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
name: jhipster-sec
services:
  app:
    image: jhipster-sec
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=prod,api-docs
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=true
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/jhipster-sec
      - SPRING_DATASOURCE_USERNAME=jhipster-sec
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://postgresql:5432/jhipster-sec
      - SPRING_MAIL_HOST=mailpit
      - SPRING_MAIL_PORT=1025
      - JHIPSTER_MAIL_BASE_URL=http://localhost:4200
    ports:
      - 127.0.0.1:8080:8080
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8080/management/health
      interval: 5s
      timeout: 5s
      retries: 40
    depends_on:
      postgresql:
        condition: service_healthy
      mailpit:
        condition: service_healthy
  postgresql:
    extends:
      file: ./postgresql.yml
      service: postgresql
  mailpit:
    extends:
      file: ./mailpit.yml
      service: mailpit
