# Production deployment template: app-only container using an operator-managed PostgreSQL instance.
# Copy this file to ~/app/app.yml on the server and pair it with ~/app/app.env.
name: jhipster-sec
services:
  app:
    image: ${APP_IMAGE:?set APP_IMAGE in app.env}
    restart: unless-stopped
    env_file:
      - ./app.env
    environment:
      - _JAVA_OPTIONS=${_JAVA_OPTIONS:--Xmx512m -Xms256m}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:-true}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/jhipster-sec}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-change-me}
      - SPRING_LIQUIBASE_URL=${SPRING_LIQUIBASE_URL:-jdbc:postgresql://postgres:5432/jhipster-sec}
      - SPRING_LIQUIBASE_USER=${SPRING_LIQUIBASE_USER:-postgres}
      - SPRING_LIQUIBASE_PASSWORD=${SPRING_LIQUIBASE_PASSWORD:-change-me}
      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-127.0.0.1}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-25}
      - JHIPSTER_MAIL_BASE_URL=${JHIPSTER_MAIL_BASE_URL:-http://27.118.20.28}
      - JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET=${JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET:-change-me-with-a-base64-secret}
    ports:
      - 127.0.0.1:8080:8080
    healthcheck:
      test:
        - CMD
        - bash
        - -lc
        - >-
          exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf 'GET /management/health/readiness HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          cat <&3 | grep -q '"status":"UP"'
      interval: 5s
      timeout: 5s
      retries: 40
networks:
  default:
    external: true
    name: ${DOCKER_NETWORK:-app-network}
