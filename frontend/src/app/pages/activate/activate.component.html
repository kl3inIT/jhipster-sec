<div class="app-auth-shell">
  <p-card styleClass="app-auth-card">
    <ng-template pTemplate="header">
      <div class="app-auth-header">
        <h1 class="m-0 text-2xl font-semibold">{{ 'activate.title' | translate }}</h1>
      </div>
    </ng-template>

    <div class="app-auth-body">
      @if (success()) {
        <p-message severity="success" [closable]="false" styleClass="w-full">
          <span [innerHTML]="'activate.messages.success' | translate"></span>
          <a routerLink="/login" class="font-medium no-underline hover:underline text-primary">
            {{ 'global.messages.info.authenticated.link' | translate }}
          </a>
          .
        </p-message>
      }

      @if (error()) {
        <p-message severity="error" [closable]="false" styleClass="w-full">
          <span [innerHTML]="'activate.messages.error' | translate"></span>
        </p-message>
      }

      <div class="app-auth-footer">
        <span class="text-color-secondary">{{ 'login.title' | translate }}</span>
        <a routerLink="/login" class="font-medium no-underline hover:underline text-primary">
          {{ 'login.form.button' | translate }}
        </a>
      </div>
    </div>
  </p-card>
</div>
