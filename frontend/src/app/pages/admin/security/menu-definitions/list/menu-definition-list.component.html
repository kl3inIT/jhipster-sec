<p-toast />
<p-confirmDialog />

<p-card>
  <ng-template #header>
    <div class="flex items-center justify-between px-4 pt-4">
      <span class="text-xl font-semibold">{{ 'pageTitle.menuDefinitions' | translate }}</span>
      <div class="flex gap-2">
        <p-button
          label="Sync from Registry"
          icon="pi pi-refresh"
          severity="secondary"
          [loading]="isSyncing"
          (onClick)="confirmSync()"
        />
        <p-button label="New Menu Definition" icon="pi pi-plus" (onClick)="openCreate()" />
      </div>
    </div>
  </ng-template>

  <p-tree [value]="treeNodes" [loading]="isLoading" styleClass="w-full border-0">
    <ng-template pTemplate="default" let-node>
      <div class="flex items-center justify-between w-full gap-3 py-1">
        <div class="flex items-center gap-2 min-w-0">
          @if (node.data.icon) {
            <i [class]="node.data.icon + ' text-color-secondary'"></i>
          }
          <span class="font-semibold">{{ node.data.label }}</span>
          <span class="text-sm text-color-secondary truncate">{{ node.data.menuId }}</span>
          @if (node.data.route) {
            <span class="text-xs text-color-secondary opacity-60 truncate">{{ node.data.route }}</span>
          }
        </div>
        <div class="flex gap-1 flex-shrink-0">
          <p-button icon="pi pi-pencil" severity="secondary" size="small" [text]="true" (onClick)="openEdit(node.data)" />
          <p-button icon="pi pi-trash" severity="danger" size="small" [text]="true" (onClick)="confirmDelete(node.data)" />
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="empty">
      <div class="flex flex-col items-center gap-4 py-8">
        <i class="pi pi-list text-4xl text-color-secondary"></i>
        <div class="text-xl font-semibold">No menu definitions</div>
        <div class="text-color-secondary">Create the first menu definition or sync existing navigation nodes from the registry.</div>
      </div>
    </ng-template>
  </p-tree>
</p-card>

@if (dialogVisible) {
  <app-menu-definition-dialog
    [visible]="dialogVisible"
    [definition]="selectedDefinition"
    (saved)="onSaved()"
    (closed)="onDialogClosed()"
  />
}
