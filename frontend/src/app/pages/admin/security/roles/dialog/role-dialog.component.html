<p-confirmDialog />
<p-toast />

<p-dialog
  [header]="
    role
      ? ('security.roles.dialog.editTitle' | translate)
      : ('security.roles.dialog.createTitle' | translate)
  "
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [style]="{ width: '30rem' }"
  [closable]="true"
>
  <form [formGroup]="editForm" (ngSubmit)="save()">
    <div class="flex flex-col gap-4 pt-2">
      <div class="flex flex-col gap-1">
        <label for="roleName" class="font-semibold">{{
          'security.roles.dialog.name' | translate
        }}</label>
        <input
          pInputText
          id="roleName"
          formControlName="name"
          [placeholder]="'security.roles.dialog.namePlaceholder' | translate"
          [readonly]="role !== null"
          class="w-full"
        />
        @if (editForm.get('name')?.invalid && editForm.get('name')?.touched) {
          <small class="text-red-500">{{ 'security.roles.dialog.nameRequired' | translate }}</small>
        }
      </div>

      <div class="flex flex-col gap-1">
        <label for="roleDisplayName" class="font-semibold">{{
          'security.roles.dialog.displayName' | translate
        }}</label>
        <input
          pInputText
          id="roleDisplayName"
          formControlName="displayName"
          [placeholder]="'security.roles.dialog.displayNamePlaceholder' | translate"
          class="w-full"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label for="roleType" class="font-semibold">{{
          'security.roles.dialog.type' | translate
        }}</label>
        <p-select
          inputId="roleType"
          formControlName="type"
          [options]="typeOptions"
          optionLabel="label"
          optionValue="value"
          [placeholder]="'security.roles.dialog.typePlaceholder' | translate"
          class="w-full"
        />
        @if (editForm.get('type')?.invalid && editForm.get('type')?.touched) {
          <small class="text-red-500">{{ 'security.roles.dialog.typeRequired' | translate }}</small>
        }
      </div>
    </div>
  </form>

  <ng-template #footer>
    <p-button
      [label]="'entity.action.cancel' | translate"
      severity="secondary"
      [outlined]="true"
      (onClick)="close()"
    />
    <p-button [label]="'entity.action.save' | translate" [loading]="isSaving" (onClick)="save()" />
  </ng-template>
</p-dialog>
