<div class="app-auth-shell">
  <p-card styleClass="app-auth-card">
    <ng-template pTemplate="header">
      <div class="app-auth-header">
        <h1 class="m-0 text-2xl font-semibold">{{ 'login.title' | translate }}</h1>
      </div>
    </ng-template>
    <div class="app-auth-body">
      @if (authenticationError()) {
        <p-message severity="error" [closable]="true" class="mb-3 w-full">
          <span [innerHTML]="'login.messages.error.authentication' | translate"></span>
        </p-message>
      }

      <form (ngSubmit)="login()" [formGroup]="loginForm" class="flex flex-column gap-3">
        <div class="flex flex-column gap-2">
          <label for="username" class="font-medium">{{
            'global.form.username.label' | translate
          }}</label>
          <input
            type="text"
            pInputText
            id="username"
            #username
            formControlName="username"
            [placeholder]="'global.form.username.placeholder' | translate"
            class="w-full"
            autocomplete="username"
          />
        </div>

        <div class="flex flex-column gap-2">
          <label for="password" class="font-medium">{{ 'login.form.password' | translate }}</label>
          <p-password
            id="password"
            formControlName="password"
            [placeholder]="'login.form.password' | translate"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full"
            inputId="password"
          />
        </div>

        <div class="flex align-items-center gap-2">
          <p-checkbox formControlName="rememberMe" [binary]="true" inputId="rememberMe" />
          <label for="rememberMe" class="cursor-pointer">{{
            'login.form.rememberme' | translate
          }}</label>
        </div>

        <p-button
          type="submit"
          [label]="'login.form.button' | translate"
          icon="pi pi-sign-in"
          [loading]="false"
          styleClass="w-full"
        />
      </form>

      <div class="app-auth-footer">
        <span class="text-color-secondary">{{
          'global.messages.info.register.noaccount' | translate
        }}</span>
        <a routerLink="/register" class="font-medium no-underline hover:underline text-primary">
          {{ 'global.messages.info.register.link' | translate }}
        </a>
      </div>
    </div>
  </p-card>
</div>
