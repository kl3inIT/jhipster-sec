<div class="flex justify-content-center align-items-center min-h-screen surface-ground">
  <p-card styleClass="w-full max-w-md shadow-3">
    <ng-template pTemplate="header">
      <div class="flex flex-column gap-2 p-4 pb-0">
        <h1 class="m-0 text-2xl font-semibold">Sign in</h1>
      </div>
    </ng-template>
    <div class="p-4 pt-0">
      @if (authenticationError()) {
        <p-message severity="error" [closable]="true" class="mb-3 w-full">
          <span><strong>Failed to sign in!</strong> Please check your credentials and try again.</span>
        </p-message>
      }

      <form (ngSubmit)="login()" [formGroup]="loginForm" class="flex flex-column gap-3">
        <div class="flex flex-column gap-2">
          <label for="username" class="font-medium">Username</label>
          <input
            type="text"
            pInputText
            id="username"
            #username
            formControlName="username"
            placeholder="Username"
            class="w-full"
            autocomplete="username"
          />
        </div>

        <div class="flex flex-column gap-2">
          <label for="password" class="font-medium">Password</label>
          <p-password
            id="password"
            formControlName="password"
            placeholder="Password"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full"
            inputId="password"
          />
        </div>

        <div class="flex align-items-center gap-2">
          <p-checkbox formControlName="rememberMe" [binary]="true" inputId="rememberMe" />
          <label for="rememberMe" class="cursor-pointer">Remember me</label>
        </div>

        <p-button type="submit" label="Sign in" icon="pi pi-sign-in" [loading]="false" styleClass="w-full" />
      </form>
    </div>
  </p-card>
</div>
