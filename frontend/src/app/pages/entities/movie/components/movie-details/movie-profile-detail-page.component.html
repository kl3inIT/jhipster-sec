<div class="film-profile-page detail-route">
  <div class="page-header">
    <div class="page-title">
      <button
        pButton
        type="button"
        class="p-button-text p-button-sm back-btn"
        icon="pi pi-arrow-left"
        label="Danh sách"
        [routerLink]="['/entities/movie']"
      ></button>
      <h1 class="m-0 text-2xl font-semibold">Chi tiết hồ sơ phim</h1>
      <!-- <p class="m-0 text-color-secondary text-sm">Xem thông tin dự án và ekip sản xuất</p> -->
    </div>
  </div>

  @if (isLoading) {
    <p class="text-color-secondary">Đang tải...</p>
  } @else if (loadError || !profile) {
    <p class="text-color-secondary">Không tìm thấy hồ sơ phim.</p>
    <button
      pButton
      type="button"
      label="Về danh sách"
      [routerLink]="['/entities/movie']"
      class="p-button-outlined mt-2"
    ></button>
  } @else {
    <app-movie-profile-detail
      [profile]="profile"
      [statusOptions]="statusOptions"
      [typeOptions]="typeOptions"
      [categoryOptions]="categoryOptions"
      [genreOptions]="genreOptions"
      [productionRoleOptions]="productionRoleOptions"
      [productionEkips]="productionEkips"
      (edit)="goToEdit($event)"
    ></app-movie-profile-detail>
  }
</div>
