<div class="mx-auto max-w-3xl space-y-4">
  <h1 class="m-0 text-3xl font-semibold" tabindex="-1">
    {{ 'pageTitle.accessDenied' | translate }}
  </h1>

  <p-card styleClass="shadow-sm">
    <div class="flex flex-column gap-3">
      <p class="m-0 text-lg">
        You do not have access to
        <span class="font-semibold">{{
          blockedLabelKey() ?? 'pageTitle.accessDenied' | translate
        }}</span
        >.
      </p>
      <p class="m-0 text-color-secondary">
        Go to
        <span class="font-semibold">{{ fallbackLabelKey() | translate }}</span>
        or contact an administrator if you think this is a mistake.
      </p>
      <div class="pt-2">
        <p-button
          [label]="'Go to ' + (fallbackLabelKey() | translate)"
          icon="pi pi-arrow-right"
          [routerLink]="fallbackRoute()"
        />
      </div>
    </div>
  </p-card>
</div>
