<form [formGroup]="form" (ngSubmit)="save()" class="edit-form">
  @if (errorMessage) {
    <div>
      <p-message severity="error" [text]="errorMessage"></p-message>
    </div>
  }

  <div class="field-grid-2">
    <div class="field">
      <label for="code">Mã dự án</label>
      <input
        pInputText
        id="code"
        type="text"
        formControlName="code"
        [disabled]="true"
      />
    </div>

    <div class="field">
      <label for="name">Tên dự án *</label>
      <input
        pInputText
        id="name"
        type="text"
        formControlName="name"
        placeholder="Nhập tên dự án"
      />
    </div>
  </div>

  <div class="field-grid-2">
    <div class="field">
      <label for="type">Loại phim *</label>
      <p-select
        id="type"
        formControlName="type"
        [options]="typeOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Chọn loại phim"
      ></p-select>
    </div>

    <div class="field">
      <label for="category">Phân loại *</label>
      <p-select
        id="category"
        formControlName="category"
        [options]="categoryOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Chọn phân loại"
      ></p-select>
    </div>
  </div>

  <div class="field-grid-3">
    <div class="field">
      <label for="genre">Thể loại</label>
      <p-select
        id="genre"
        formControlName="genre"
        [options]="genreOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Chọn thể loại"
      ></p-select>
    </div>

    <div class="field">
      <label for="productionYear">Năm sản xuất *</label>
      <input
        pInputText
        id="productionYear"
        type="number"
        formControlName="productionYear"
        placeholder="Năm"
      />
    </div>

    <div class="field">
      <label for="status">Trạng thái *</label>
      <p-select
        id="status"
        formControlName="status"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Chọn trạng thái"
      ></p-select>
    </div>
  </div>

  <div class="field-grid-2">
    <div class="field">
      <label for="startDate">Ngày bắt đầu</label>
      <p-datepicker
        id="startDate"
        formControlName="startDate"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
      ></p-datepicker>
    </div>

    <div class="field">
      <label for="endDate">Ngày kết thúc</label>
      <p-datepicker
        id="endDate"
        formControlName="endDate"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
      ></p-datepicker>
    </div>
  </div>

  <div class="field">
    <label for="summary">Tóm tắt</label>
    <textarea
      pInputTextarea
      id="summary"
      formControlName="summary"
      rows="2"
      placeholder="Nhập tóm tắt dự án"
    ></textarea>
  </div>

  <div class="form-actions">
    <p-button
      type="submit"
      label="Cập nhật"
      icon="pi pi-check"
      [loading]="isSaving"
      [disabled]="isSaving"
    ></p-button>
    <p-button
      type="button"
      label="Hủy"
      icon="pi pi-times"
      severity="secondary"
      (onClick)="cancel()"
      [disabled]="isSaving"
    ></p-button>
  </div>
</form>
