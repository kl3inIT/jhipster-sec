<div class="layout-topbar flex items-center w-full">
  <button
    type="button"
    class="inline-flex items-center justify-center p-2 rounded-lg border-0 cursor-pointer"
    (click)="layoutService.onMenuToggle()"
    [attr.aria-label]="'layout.topbar.toggleMenu' | translate"
  >
    <i class="pi pi-bars text-xl"></i>
  </button>
  <div class="ml-auto flex items-center gap-2">
    <div #settingsWrapper class="layout-topbar-config-wrapper">
      <button
        type="button"
        class="inline-flex items-center justify-center p-2 rounded-lg border-0 cursor-pointer"
        [attr.aria-label]="'layout.topbar.openSettings' | translate"
        [attr.aria-expanded]="settingsOpen()"
        (click)="toggleSettings($event)"
      >
        <i class="pi pi-cog text-xl"></i>
      </button>
      @if (settingsOpen()) {
        <app-configurator />
      }
    </div>
    @if (currentAccount) {
      <span class="text-sm font-medium">{{ currentAccount.login }}</span>
      <button
        type="button"
        class="inline-flex items-center justify-center p-2 rounded-lg border-0 cursor-pointer"
        (click)="logout()"
        [attr.aria-label]="'layout.topbar.logout' | translate"
      >
        <i class="pi pi-sign-out text-xl"></i>
      </button>
    } @else {
      <button
        type="button"
        class="inline-flex items-center justify-center p-2 rounded-lg border-0 cursor-pointer"
        (click)="login()"
        [attr.aria-label]="'layout.topbar.login' | translate"
      >
        <i class="pi pi-sign-in text-xl"></i>
      </button>
    }
  </div>
</div>
