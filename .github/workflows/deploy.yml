name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build and Publish Deployment Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # One-time rollout note: workflow_run listeners only fire after this workflow
      # file exists on the default branch.
      - name: Check out CI-validated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install root npm dependencies
        run: npm ci

      - name: Build and push backend image to GHCR
        env:
          SHORT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          SHORT_SHA=$(echo "$SHORT_SHA" | cut -c1-7)
          ./gradlew -Pprod jib \
            -Djib.to.image=ghcr.io/${{ github.repository_owner }}/jhipster-sec:latest \
            -Djib.to.tags=sha-${SHORT_SHA} \
            -Djib.to.auth.username=${{ github.repository_owner }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

      - name: Operator prerequisites for first production deployment
        run: |
          echo "Before the first live run, confirm these operator-managed prerequisites:"
          echo "- Repository secrets DEPLOY_HOST and DEPLOY_SSH_KEY are configured."
          echo "- The production server is already authenticated for private GHCR pulls (for example via docker login ghcr.io)."
          echo "- The deploy account has Docker Compose access and can run docker compose without interactive sudo."
          echo "- The production compose file exists at ~/app/app.yml on the server."
          echo "- The matching environment file exists at ~/app/app.env and is populated from src/main/docker/app.env.example with real secrets."
          echo "- The app container can reach the existing PostgreSQL database named postgres from the external Docker network app-network."
          echo "- DEPLOY_HOST resolves to a runner-reachable host or ingress path that serves /management/health/readiness through the real VPN/Nginx Proxy Manager topology."
          echo "- ssh-keyscan host verification below must succeed before SSH deployment runs."
          echo "- ~/app/app.yml stays app-only; PostgreSQL and mail infrastructure remain operator-managed and are not started by this workflow."

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deployment host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend image with remote docker compose
        run: |
          ssh deploy@${{ secrets.DEPLOY_HOST }} \
            'docker compose -f ~/app/app.yml pull && docker compose -f ~/app/app.yml up -d'

      - name: Verify deployment readiness
        run: |
          echo "Polling readiness at http://${{ secrets.DEPLOY_HOST }}/management/health/readiness"
          timeout 60 bash -c 'until curl -sf http://${{ secrets.DEPLOY_HOST }}/management/health/readiness; do sleep 3; done'
          echo "Deployment is ready."
