name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build and Publish Deployment Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # One-time rollout note: workflow_run listeners only fire after this workflow
      # file exists on the default branch.
      - name: Check out CI-validated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install root npm dependencies
        run: npm ci

      - name: Build and push backend image to GHCR
        env:
          SHORT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          SHORT_SHA=$(echo "$SHORT_SHA" | cut -c1-7)
          ./gradlew -Pprod jib \
            -Djib.to.image=ghcr.io/${{ github.repository_owner }}/jhipster-sec:latest \
            -Djib.to.tags=sha-${SHORT_SHA} \
            -Djib.to.auth.username=${{ github.repository_owner }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}
